<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Technology</title>
    <link rel="icon" href="./assets/bg remove.webp">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./root.css">

    <!-- material icon -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- font awesome icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- aos animations -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body>

<style>
    .error-page {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--bg-main);
    text-align: center;
    padding: 2rem;
}

.error-container {
    max-width: 600px;
}

.error-visual {
    position: relative;
    margin-bottom: 40px;
}

.error-code {
    font-size: 8rem;
    font-weight: 800;
    color: var(--primary-bio-green);
    letter-spacing: -5px;
    line-height: 1;
    margin-bottom: 0;
    /* Subtle glow without using RGBA */
    text-shadow: 2px 2px 0px var(--bg-subtle);
}

/* DNA Pulse Animation */
.dna-animation {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.dna-animation span {
    width: 15px;
    height: 15px;
    background-color: var(--primary-bio-green);
    border-radius: 50%;
    animation: bio-pulse 1.5s infinite ease-in-out;
}

.dna-animation span:nth-child(2) { animation-delay: 0.2s; }
.dna-animation span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bio-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.3; }
}

.error-content h2 {
    font-size: 2.5rem;
    border: none;
    padding-left: 0;
    margin-bottom: 1rem;
}

.error-content h2 span {
    color: var(--primary-bio-green);
}

.error-content p {
    margin-bottom: 2rem;
    color: var(--text-muted);
}

.error-btns {
    display: flex;
    gap: 15px;
    justify-content: center;
}

@media (max-width: 768px) {
    .error-code {
        font-size: 5rem;
    }
    
    .error-content h2 {
        font-size: 1.8rem;
    }
    
    .error-btns {
        flex-direction: column;
    }
    
    .btn {
        width: 100%;
    }
}
</style>

    <section class="error-page">
    <div class="error-container">
        <div class="error-visual">
            <div class="dna-animation">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <h1 class="error-code">404</h1>
        </div>

        <div class="error-content">
            <span class="eyebrow">Sequence Interrupted</span>
            <h2>Genetic Path <span>Not Found.</span></h2>
            <p>The molecular coordinates you are looking for do not exist in our current database. The sequence may have been relocated or terminated.</p>
            
            <div class="error-btns">
                <a href="index.html" class="btn btn-primary">Return to Base</a>
                <!-- <a href="#" class="btn btn-secondary" onclick="history.back()">Previous Sequence</a> -->
            </div>
        </div>
    </div>
</section>

<script>
    function glitchEffect() {
    const errorCode = document.querySelector('.error-code');
    if(!errorCode) return;
    
    setInterval(() => {
        errorCode.style.opacity = "0.7";
        setTimeout(() => {
            errorCode.style.opacity = "1";
        }, 50);
    }, 3000);
}

glitchEffect();
</script>

</body>
</html>
